version: "3.9"

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: tiketfast-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - tiketfast-net
    restart: unless-stopped

  app1:
    build: ./app
    container_name: tiketfast-app1
    environment:
      - NODE_ID=app1
      - REDIS_HOST=redis
      - PG_MASTER_HOST=postgres-master
      - PG_REPLICA_HOST=postgres-replica
      - QUEUE_THRESHOLD=50000
      - LOCK_TTL_SECONDS=600
    depends_on:
      - redis
      - postgres-master
    networks:
      - tiketfast-net
    restart: unless-stopped

  app2:
    build: ./app
    container_name: tiketfast-app2
    environment:
      - NODE_ID=app2
      - REDIS_HOST=redis
      - PG_MASTER_HOST=postgres-master
      - PG_REPLICA_HOST=postgres-replica
      - QUEUE_THRESHOLD=50000
      - LOCK_TTL_SECONDS=600
    depends_on:
      - redis
      - postgres-master
    networks:
      - tiketfast-net
    restart: unless-stopped

  app3:
    build: ./app
    container_name: tiketfast-app3
    environment:
      - NODE_ID=app3
      - REDIS_HOST=redis
      - PG_MASTER_HOST=postgres-master
      - PG_REPLICA_HOST=postgres-replica
      - QUEUE_THRESHOLD=50000
      - LOCK_TTL_SECONDS=600
    depends_on:
      - redis
      - postgres-master
    networks:
      - tiketfast-net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: tiketfast-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - tiketfast-net
    restart: unless-stopped

  postgres-master:
    image: postgres:16-alpine
    container_name: tiketfast-pg-master
    environment:
      - POSTGRES_USER=tiketfast
      - POSTGRES_PASSWORD=tiketfast_pass
      - POSTGRES_DB=tiketfast
    volumes:
      - ./postgres/master.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init-master.sh:/docker-entrypoint-initdb.d/init-master.sh:ro
      - pg-master-data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "5432:5432"
    networks:
      - tiketfast-net
    restart: unless-stopped

  postgres-replica:
    image: postgres:16-alpine
    container_name: tiketfast-pg-replica
    environment:
      - POSTGRES_USER=tiketfast
      - POSTGRES_PASSWORD=tiketfast_pass
      - POSTGRES_DB=tiketfast
      - PGUSER=tiketfast
    volumes:
      - ./postgres/replica.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
      - pg-replica-data:/var/lib/postgresql/data
    entrypoint: ["/docker-entrypoint-initdb.d/init-replica.sh"]
    depends_on:
      - postgres-master
    ports:
      - "5433:5432"
    networks:
      - tiketfast-net
    restart: unless-stopped

networks:
  tiketfast-net:
    driver: bridge

volumes:
  pg-master-data:
  pg-replica-data:

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    limit_req_zone $binary_remote_addr zone=vwr_zone:10m rate=50r/s;

    upstream tiketfast_app {
        least_conn;
        server app1:3000 max_fails=3 fail_timeout=5s;
        server app2:3000 max_fails=3 fail_timeout=5s;
        server app3:3000 max_fails=3 fail_timeout=5s;
    }

    server {
        listen 80;

        location / {
            limit_req zone=vwr_zone burst=100 nodelay;

            proxy_pass http://tiketfast_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }

        location /health {
            access_log off;
            return 200 "nginx ok\n";
        }
    }
}
